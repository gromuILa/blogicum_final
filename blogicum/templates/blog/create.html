{% extends "base.html" %}
{% block title %}
  {% if post %}Редактирование публикации{% else %}Новая публикация{% endif %}
{% endblock %}
{% block content %}
  <h1>
    {% if post %}Редактирование публикации{% else %}Новая публикация{% endif %}
  </h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">
      {% if post %}Сохранить{% else %}Опубликовать{% endif %}
    </button>
  </form>
{% endblock %}
